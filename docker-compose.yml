name: movie-ticket-watcher
x-app: &app
  image: ${IMAGE_NAME:-movie-ticket-watcher}:${IMAGE_TAG:-local}
  env_file: .env
  environment:
    TZ: ${APP_TIMEZONE:-Asia/Kolkata}
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    TELEGRAM_DEFAULT_CHAT_ID: ${TELEGRAM_DEFAULT_CHAT_ID:-}
    TELEGRAM_API_BASE: ${TELEGRAM_API_BASE:-https://api.telegram.org}
    TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
    TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:-}
  user: "${PUID:-1000}:${PGID:-1000}"
  volumes:
    - ./data:/data
    - ./config:/config
  restart: unless-stopped
  init: true
  stop_grace_period: 45s
  shm_size: 1gb
  cap_drop: [ALL]
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  web:
    <<: *app
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-0.2.0}
    container_name: movie-ticket-watcher-web
    command: web
    ports:
      - "${HOST_PORT:-8787}:8787"
    healthcheck:
      test: [CMD, python, /app/scripts/healthcheck.py, --web]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  worker:
    <<: *app
    container_name: movie-ticket-watcher-worker
    command: worker
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: [CMD, python, /app/scripts/healthcheck.py, --worker]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3

  telegram-bot:
    <<: *app
    container_name: movie-ticket-watcher-telegram-bot
    command: telegram-bot
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: [CMD, python, /app/scripts/healthcheck.py, --telegram-bot]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  test:
    <<: *app
    profiles: [test]
    restart: "no"
    command: test
    depends_on: {}
    volumes:
      - ./data:/data
      - ./config:/config
